  <rect x="748" y="410" width="352" height="8" rx="4" fill="#F1F5F9"/>
  <rect x="748" y="410" width="240" height="8" rx="4" fill="#1D5DD4"/>
  <text x="748" y="435" font-family="Inter, Arial, sans-serif" font-size="10" fill="#94A3B8">68% achieved</text>
  <text x="1100" y="435" font-family="Inter, Arial, sans-serif" font-size="10" fill="#22C55E" text-anchor="end">On track ✓</text>

  <!-- Product tags -->
  <rect x="740" y="455" width="90" height="26" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="785" y="472" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#1D5DD4" text-anchor="middle">SalonOS</text>
  <rect x="840" y="455" width="90" height="26" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="885" y="472" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#1D5DD4" text-anchor="middle">SevakoPOS</text>
