<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="60%" style="stop-color:#0D1F3C"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D5DD4"/>
      <stop offset="100%" style="stop-color:#3B7FE8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1D5DD4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1D5DD4;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow circles -->
  <circle cx="200" cy="300" r="280" fill="#1D5DD4" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="950" cy="200" r="220" fill="#1D5DD4" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="1100" cy="500" r="180" fill="#F59E0B" opacity="0.04" filter="url(#blur2)"/>

  <!-- Grid dots -->
  <g opacity="0.07">
    <circle cx="80" cy="80" r="2" fill="#fff"/>
    <circle cx="160" cy="80" r="2" fill="#fff"/>
    <circle cx="240" cy="80" r="2" fill="#fff"/>
    <circle cx="320" cy="80" r="2" fill="#fff"/>
    <circle cx="80" cy="160" r="2" fill="#fff"/>
    <circle cx="160" cy="160" r="2" fill="#fff"/>
    <circle cx="240" cy="160" r="2" fill="#fff"/>
    <circle cx="1040" cy="400" r="2" fill="#fff"/>
    <circle cx="1120" cy="400" r="2" fill="#fff"/>
    <circle cx="1040" cy="480" r="2" fill="#fff"/>
    <circle cx="1120" cy="480" r="2" fill="#fff"/>
    <circle cx="1040" cy="560" r="2" fill="#fff"/>
