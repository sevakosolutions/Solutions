  <text x="758" y="158" font-family="Inter, Arial, sans-serif" font-size="10" fill="#94A3B8" font-weight="600">STAFF PRESENT</text>
  <text x="758" y="195" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1D5DD4">94.2%</text>
