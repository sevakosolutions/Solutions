  <circle cx="104" cy="108" r="5" fill="#F59E0B"/>
  <text x="120" y="113" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)" letter-spacing="2">BUSINESS TECH FOR INDIAN SMES</text>

